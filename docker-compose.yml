version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: anomaly-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: anomaly-dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - API_BASE=http://api:8000
    depends_on:
      - api
    restart: unless-stopped